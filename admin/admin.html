<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ササゲパス | サイト管理画面</title>
<style>
  :root {
    --navy: #3B6EF8;
    --navy-dark: #2454D6;
    --orange: #FF6B35;
    --orange-dark: #E8511E;
    --gray: #F4F7FF;
    --gray-mid: #DDE4F8;
    --text: #1E293B;
    --text-mid: #5A6A8A;
    --text-light: #8A97B8;
    --green: #2c9e5e;
    --red: #e5484d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
    background: var(--gray);
    color: var(--text);
    padding-bottom: 120px;
  }
  header.topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--navy);
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    flex-wrap: wrap;
  }
  header.topbar h1 {
    font-size: 16px;
    font-weight: 800;
    margin: 0;
    flex-shrink: 0;
  }
  header.topbar .spacer { flex: 1; }
  header.topbar a.preview-link {
    color: #fff;
    font-size: 13px;
    text-decoration: underline;
    opacity: 0.85;
  }
  .btn {
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-save { background: #fff; color: var(--navy); }
  .btn-save:hover { background: #eef2ff; }
  .btn-publish { background: var(--orange); color: #fff; }
  .btn-publish:hover { background: var(--orange-dark); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #status-bar {
    max-width: 900px;
    margin: 14px auto 0;
    padding: 0 20px;
    font-size: 13px;
  }
  .status-msg {
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 10px;
    white-space: pre-wrap;
    line-height: 1.6;
  }
  .status-ok { background: #e6f6ec; color: var(--green); border: 1px solid #b8e6c8; }
  .status-error { background: #fdeceb; color: var(--red); border: 1px solid #f5b9b8; }
  .status-info { background: #eef2ff; color: var(--navy-dark); border: 1px solid var(--gray-mid); }

  main {
    max-width: 900px;
    margin: 20px auto;
    padding: 0 20px;
  }
  .group {
    background: #fff;
    border: 1px solid var(--gray-mid);
    border-radius: 12px;
    margin-bottom: 18px;
    overflow: hidden;
  }
  .group-header {
    background: var(--gray);
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 800;
    color: var(--navy-dark);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }
  .group-header .chevron { transition: transform 0.2s; font-size: 11px; color: var(--text-light); }
  .group.collapsed .chevron { transform: rotate(-90deg); }
  .group-body { padding: 16px 18px; }
  .group.collapsed .group-body { display: none; }

  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--text-mid);
    margin-bottom: 5px;
  }
  .field textarea, .field .rte {
    width: 100%;
    border: 1px solid var(--gray-mid);
    border-radius: 8px;
    padding: 9px 11px;
    font-size: 13.5px;
    font-family: inherit;
    color: var(--text);
    line-height: 1.7;
    resize: vertical;
    min-height: 42px;
  }
  .field textarea:focus, .field .rte:focus {
    outline: none;
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(59,110,248,0.12);
  }
  .field .rte { min-height: 46px; }
  .field .hint { font-size: 11px; color: var(--text-light); margin-top: 4px; }

  #loading, #empty {
    text-align: center;
    color: var(--text-light);
    padding: 60px 20px;
    font-size: 13px;
  }
</style>
</head>
<body>

  <header class="topbar">
    <h1>ササゲパス 管理画面</h1>
    <a class="preview-link" href="../index.html" target="_blank">サイトをプレビュー ↗</a>
    <div class="spacer"></div>
    <button class="btn btn-save" id="btnSave">保存（下書き）</button>
    <button class="btn btn-publish" id="btnPublish">公開する</button>
  </header>

  <div id="status-bar"></div>

  <main>
    <div id="loading">読み込み中...</div>
    <div id="groups"></div>
  </main>

<script>
(function () {
  const groupsEl = document.getElementById('groups');
  const loadingEl = document.getElementById('loading');
  const statusBar = document.getElementById('status-bar');
  const btnSave = document.getElementById('btnSave');
  const btnPublish = document.getElementById('btnPublish');

  let fieldEls = {}; // id -> {type, el}

  function showStatus(kind, message) {
    statusBar.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'status-msg status-' + kind;
    div.textContent = message;
    statusBar.appendChild(div);
  }

  function clearStatus() {
    statusBar.innerHTML = '';
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function render(fields) {
    loadingEl.style.display = 'none';
    if (!fields || fields.length === 0) {
      const empty = document.createElement('div');
      empty.id = 'empty';
      empty.textContent = '編集可能な項目が見つかりませんでした。';
      groupsEl.appendChild(empty);
      return;
    }

    const groupOrder = [];
    const byGroup = {};
    fields.forEach(f => {
      if (!byGroup[f.group]) { byGroup[f.group] = []; groupOrder.push(f.group); }
      byGroup[f.group].push(f);
    });

    groupOrder.forEach(groupName => {
      const groupDiv = document.createElement('div');
      groupDiv.className = 'group';

      const header = document.createElement('div');
      header.className = 'group-header';
      header.innerHTML = '<span>' + escapeHtml(groupName) + '</span><span class="chevron">▼</span>';
      header.addEventListener('click', () => groupDiv.classList.toggle('collapsed'));
      groupDiv.appendChild(header);

      const body = document.createElement('div');
      body.className = 'group-body';

      byGroup[groupName].forEach(f => {
        const fieldDiv = document.createElement('div');
        fieldDiv.className = 'field';

        const label = document.createElement('label');
        label.textContent = f.label;
        fieldDiv.appendChild(label);

        let inputEl;
        if (f.type === 'richtext') {
          inputEl = document.createElement('div');
          inputEl.className = 'rte';
          inputEl.contentEditable = 'true';
          inputEl.innerHTML = f.value;
        } else {
          inputEl = document.createElement('textarea');
          inputEl.value = f.value;
          inputEl.rows = f.type === 'list' ? Math.max(2, f.value.split('\n').length) : 2;
        }
        fieldDiv.appendChild(inputEl);

        if (f.type === 'list') {
          const hint = document.createElement('div');
          hint.className = 'hint';
          hint.textContent = '1行に1項目ずつ入力してください。';
          fieldDiv.appendChild(hint);
        }
        if (f.type === 'richtext') {
          const hint = document.createElement('div');
          hint.className = 'hint';
          hint.textContent = '改行や強調（太字）などの書式を含みます。崩れた場合はチャットでお知らせください。';
          fieldDiv.appendChild(hint);
        }

        body.appendChild(fieldDiv);
        fieldEls[f.id] = { type: f.type, el: inputEl };
      });

      groupDiv.appendChild(body);
      groupsEl.appendChild(groupDiv);
    });
  }

  function collectValues() {
    const out = {};
    Object.keys(fieldEls).forEach(id => {
      const { type, el } = fieldEls[id];
      out[id] = (type === 'richtext') ? el.innerHTML : el.value;
    });
    return out;
  }

  function setButtonsDisabled(disabled) {
    btnSave.disabled = disabled;
    btnPublish.disabled = disabled;
  }

  async function loadFields() {
    try {
      const res = await fetch('/api/fields');
      const fields = await res.json();
      render(fields);
    } catch (e) {
      loadingEl.textContent = '読み込みに失敗しました: ' + e.message;
    }
  }

  btnSave.addEventListener('click', async () => {
    setButtonsDisabled(true);
    showStatus('info', '保存しています...');
    try {
      const res = await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(collectValues())
      });
      const data = await res.json();
      if (data.ok) {
        showStatus('ok', '保存しました（このPC内のみ。サイトへの公開はまだです）。「サイトをプレビュー」で確認できます。');
      } else {
        showStatus('error', '保存に失敗しました: ' + (data.error || ''));
      }
    } catch (e) {
      showStatus('error', '保存に失敗しました: ' + e.message);
    }
    setButtonsDisabled(false);
  });

  btnPublish.addEventListener('click', async () => {
    if (!confirm('変更を保存し、サイトに公開します。よろしいですか？')) return;
    setButtonsDisabled(true);
    showStatus('info', '公開しています...（少し時間がかかる場合があります）');
    try {
      const res = await fetch('/api/publish', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(collectValues())
      });
      const data = await res.json();
      if (data.ok) {
        showStatus('ok', '公開しました。1〜2分ほどでサイトに反映されます。\n\n' + (data.output || ''));
      } else {
        showStatus('error', '公開に失敗しました: ' + (data.output || data.error || ''));
      }
    } catch (e) {
      showStatus('error', '公開に失敗しました: ' + e.message);
    }
    setButtonsDisabled(false);
  });

  loadFields();
})();
</script>

</body>
</html>
